```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RMAIL ログイン</title>

<style>
body{
font-family:sans-serif;
background:#f5f7fa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
width:320px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
background:#2b7cff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.google{
background:#4285F4;
}

.microsoft{
background:#333;
}
</style>
</head>

<body>

<div class="box">

<h2>RMAIL ログイン</h2>

<input id="email" placeholder="メール">
<input id="password" type="password" placeholder="パスワード">

<button onclick="login()">ログイン</button>

<button class="google" onclick="google()">Googleログイン</button>

<button class="microsoft" onclick="microsoft()">Microsoftログイン</button>

<p><a href="register.html">新規登録</a></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>

<script>

const client=new Appwrite.Client()
.setEndpoint("https://cloud.appwrite.io/v1")
.setProject("69aeb448002665910503")

const account=new Appwrite.Account(client)

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

try{

await account.createEmailSession(email,password)

location.href="home.html"

}catch(err){

alert(err.message)

}

}

function google(){

account.createOAuth2Session(
"google",
window.location.origin+"/home.html",
window.location.origin+"/login.html"
)

}

function microsoft(){

account.createOAuth2Session(
"microsoft",
window.location.origin+"/home.html",
window.location.origin+"/login.html"
)

}

</script>

</body>
</html>
```
